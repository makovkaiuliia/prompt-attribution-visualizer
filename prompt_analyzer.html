<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Attribution Visualizer</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AlertCircle = ({ className, size }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const Sparkles = ({ className, size }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"></path>
            </svg>
        );

        const ArrowRight = ({ className, size }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        );

        const PromptAttributionVisualizer = () => {
            const [apiKey, setApiKey] = useState('');
            const [systemPrompt, setSystemPrompt] = useState(`1) пиши коротко
2) все слова маленькими буквами
3) пиши грамотно`);
            const [userMessage, setUserMessage] = useState('Спроси меня, как прошла моя поездка в Париж');
            const [modelResponse, setModelResponse] = useState('');
            const [attribution, setAttribution] = useState(null);
            const [loading, setLoading] = useState(false);
            const [analyzing, setAnalyzing] = useState(false);
            const [error, setError] = useState('');
            const [selectedText, setSelectedText] = useState('');
            const [highlightedPromptParts, setHighlightedPromptParts] = useState([]);
            const [step, setStep] = useState(1);
            const responseRef = useRef(null);

            const getModelResponse = async () => {
                if (!apiKey) {
                    setError('Введите OpenAI API ключ');
                    return;
                }

                setLoading(true);
                setError('');
                setAttribution(null);

                try {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4o',
                            messages: [
                                { role: 'system', content: systemPrompt },
                                { role: 'user', content: userMessage }
                            ],
                            temperature: 0.7
                        })
                    });

                    const data = await res.json();
                    
                    if (data.error) {
                        setError(data.error.message);
                        setLoading(false);
                        return;
                    }

                    const content = data.choices[0].message.content;
                    setModelResponse(content);
                    setStep(2);
                } catch (err) {
                    setError(err.message);
                }

                setLoading(false);
            };

            const analyzeResponse = async () => {
                setAnalyzing(true);
                setError('');

                const analysisPrompt = `Ты анализатор влияния промптов на ответы LLM моделей.

ДАНО:
Системный промпт:
\`\`\`
${systemPrompt}
\`\`\`

Запрос пользователя:
${userMessage}

Ответ модели:
${modelResponse}

ЗАДАЧА:
Проанализируй, какие КОНКРЕТНЫЕ КУСКИ системного промпта повлияли на разные части ответа.

Верни ТОЛЬКО валидный JSON (без markdown блоков):

{
  "attributions": [
    {
      "output_text": "кусок из ответа модели",
      "prompt_spans": [
        {
          "text": "точная цитата из системного промпта",
          "influence": 85,
          "explanation": "почему этот кусок промпта повлиял на этот кусок ответа"
        }
      ]
    }
  ]
}

ВАЖНО:
- "text" в prompt_spans должен быть ТОЧНОЙ цитатой из системного промпта
- Разбей ответ модели на смысловые куски (слова, фразы)
- Для каждого куска найди все релевантные части промпта
- influence от 0 до 100`;

                try {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4o',
                            messages: [
                                { role: 'user', content: analysisPrompt }
                            ],
                            temperature: 0.3
                        })
                    });

                    const data = await res.json();
                    
                    if (data.error) {
                        setError(data.error.message);
                        setAnalyzing(false);
                        return;
                    }

                    const content = data.choices[0].message.content;
                    const cleanContent = content.replace(/```json\s*|\s*```/g, '').trim();
                    
                    try {
                        const parsed = JSON.parse(cleanContent);
                        setAttribution(parsed);
                        setStep(3);
                    } catch (e) {
                        setError('Не удалось распарсить JSON от анализатора: ' + e.message);
                        console.error('Ответ анализатора:', content);
                    }
                } catch (err) {
                    setError(err.message);
                }

                setAnalyzing(false);
            };

            useEffect(() => {
                if (step === 3 && responseRef.current) {
                    const handleSelection = () => {
                        const selection = window.getSelection();
                        const text = selection.toString().trim();
                        
                        if (text && responseRef.current.contains(selection.anchorNode)) {
                            setSelectedText(text);
                            
                            // Найти соответствующую атрибуцию
                            const matchedAttribution = attribution?.attributions?.find(attr => 
                                attr.output_text.toLowerCase().includes(text.toLowerCase()) ||
                                text.toLowerCase().includes(attr.output_text.toLowerCase())
                            );
                            
                            if (matchedAttribution) {
                                setHighlightedPromptParts(matchedAttribution.prompt_spans);
                            } else {
                                setHighlightedPromptParts([]);
                            }
                        }
                    };

                    document.addEventListener('mouseup', handleSelection);
                    return () => document.removeEventListener('mouseup', handleSelection);
                }
            }, [step, attribution]);

            const renderHighlightedPrompt = () => {
                if (highlightedPromptParts.length === 0) {
                    return <div className="text-slate-700 whitespace-pre-wrap font-mono text-sm">{systemPrompt}</div>;
                }

                let highlightedText = systemPrompt;
                const highlights = [];

                // Создаем список всех совпадений с их позициями
                highlightedPromptParts.forEach((span, idx) => {
                    const text = span.text;
                    let pos = highlightedText.toLowerCase().indexOf(text.toLowerCase());
                    
                    while (pos !== -1) {
                        highlights.push({
                            start: pos,
                            end: pos + text.length,
                            influence: span.influence,
                            explanation: span.explanation,
                            index: idx
                        });
                        pos = highlightedText.toLowerCase().indexOf(text.toLowerCase(), pos + 1);
                    }
                });

                // Сортируем по позиции
                highlights.sort((a, b) => a.start - b.start);

                // Создаем массив элементов для рендера
                const elements = [];
                let lastPos = 0;

                highlights.forEach((highlight, idx) => {
                    // Добавляем текст до подсветки
                    if (highlight.start > lastPos) {
                        elements.push(
                            <span key={`text-${idx}`}>{highlightedText.slice(lastPos, highlight.start)}</span>
                        );
                    }

                    // Добавляем подсвеченный текст
                    const intensity = Math.floor((highlight.influence / 100) * 5);
                    const bgColors = [
                        'bg-yellow-100',
                        'bg-yellow-200', 
                        'bg-yellow-300',
                        'bg-orange-300',
                        'bg-orange-400'
                    ];

                    elements.push(
                        <mark
                            key={`highlight-${idx}`}
                            className={`${bgColors[intensity]} px-1 rounded transition-all cursor-help`}
                            title={highlight.explanation}
                        >
                            {highlightedText.slice(highlight.start, highlight.end)}
                        </mark>
                    );

                    lastPos = highlight.end;
                });

                // Добавляем оставшийся текст
                if (lastPos < highlightedText.length) {
                    elements.push(
                        <span key="text-end">{highlightedText.slice(lastPos)}</span>
                    );
                }

                return <div className="whitespace-pre-wrap font-mono text-sm">{elements}</div>;
            };

            const reset = () => {
                setModelResponse('');
                setAttribution(null);
                setStep(1);
                setError('');
                setSelectedText('');
                setHighlightedPromptParts([]);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="mb-8">
                            <div className="flex items-center gap-3 mb-2">
                                <Sparkles className="text-purple-600" size={32} />
                                <h1 className="text-3xl font-bold text-slate-800">Prompt Attribution Visualizer</h1>
                            </div>
                            <p className="text-slate-600">Выделяйте текст в ответе модели → видите, какие куски промпта на него повлияли</p>
                        </div>

                        <div className="mb-8 flex items-center justify-center gap-4">
                            <div className={`flex items-center gap-2 px-4 py-2 rounded-lg ${step >= 1 ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-400'}`}>
                                <span className="font-semibold">1. Получить ответ</span>
                            </div>
                            <ArrowRight size={20} className="text-gray-400" />
                            <div className={`flex items-center gap-2 px-4 py-2 rounded-lg ${step >= 2 ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-400'}`}>
                                <span className="font-semibold">2. Анализ</span>
                            </div>
                            <ArrowRight size={20} className="text-gray-400" />
                            <div className={`flex items-center gap-2 px-4 py-2 rounded-lg ${step >= 3 ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-400'}`}>
                                <span className="font-semibold">3. Интерактивная визуализация</span>
                            </div>
                        </div>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
                                <AlertCircle className="text-red-600 mt-0.5" size={20} />
                                <p className="text-red-700">{error}</p>
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <div className="bg-white rounded-lg shadow-sm p-6 border border-slate-200">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    OpenAI API Key
                                </label>
                                <input
                                    type="password"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                    placeholder="sk-..."
                                />
                            </div>

                            <div className="bg-white rounded-lg shadow-sm p-6 border border-slate-200">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">
                                    Сообщение пользователя
                                </label>
                                <input
                                    type="text"
                                    value={userMessage}
                                    onChange={(e) => setUserMessage(e.target.value)}
                                    className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                    placeholder="Ваш запрос..."
                                />
                            </div>
                        </div>

                        <div className="bg-white rounded-lg shadow-sm p-6 border border-slate-200 mb-6">
                            <label className="block text-sm font-semibold text-slate-700 mb-2">
                                Системный промпт (инструкции)
                            </label>
                            <textarea
                                value={systemPrompt}
                                onChange={(e) => setSystemPrompt(e.target.value)}
                                className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono text-sm"
                                rows="5"
                            />
                        </div>

                        {step === 1 && (
                            <button
                                onClick={getModelResponse}
                                disabled={loading}
                                className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-lg font-semibold hover:from-purple-700 hover:to-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg"
                            >
                                {loading ? 'Получаем ответ модели...' : 'Шаг 1: Получить ответ модели'}
                            </button>
                        )}

                        {step === 2 && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-lg shadow-sm p-6 border border-slate-200">
                                    <h3 className="text-lg font-semibold text-slate-800 mb-3">Ответ модели:</h3>
                                    <p className="text-slate-700 text-lg leading-relaxed">{modelResponse}</p>
                                </div>
                                <div className="flex gap-4">
                                    <button
                                        onClick={analyzeResponse}
                                        disabled={analyzing}
                                        className="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 text-white py-4 rounded-lg font-semibold hover:from-green-700 hover:to-emerald-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg"
                                    >
                                        {analyzing ? 'Анализируем влияние промпта...' : 'Шаг 2: Анализировать влияние промпта'}
                                    </button>
                                    <button
                                        onClick={reset}
                                        className="px-6 py-4 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-all"
                                    >
                                        Начать заново
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 3 && attribution && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-r from-blue-50 to-purple-50 border-2 border-blue-200 rounded-lg p-6">
                                    <p className="text-slate-700 text-center font-semibold">
                                        💡 Выделяйте мышкой текст в ответе модели справа → слева подсветятся куски промпта, которые повлияли
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white rounded-lg shadow-sm p-6 border-2 border-slate-200">
                                        <h2 className="text-lg font-semibold text-slate-800 mb-4">
                                            Системный промпт
                                            {selectedText && (
                                                <span className="ml-2 text-sm text-purple-600">
                                                    (подсвечены влияющие куски)
                                                </span>
                                            )}
                                        </h2>
                                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                            {renderHighlightedPrompt()}
                                        </div>
                                        
                                        {highlightedPromptParts.length > 0 && (
                                            <div className="mt-4 space-y-2">
                                                <h3 className="text-sm font-semibold text-slate-700">Детали влияния:</h3>
                                                {highlightedPromptParts.map((span, idx) => (
                                                    <div key={idx} className="p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                                                        <div className="text-sm">
                                                            <span className="font-semibold text-slate-700">Кусок промпта:</span>
                                                            <span className="ml-2 font-mono text-slate-600">"{span.text}"</span>
                                                        </div>
                                                        <div className="text-sm mt-1">
                                                            <span className="font-semibold text-slate-700">Влияние:</span>
                                                            <span className="ml-2 text-slate-600">{span.influence}%</span>
                                                        </div>
                                                        <div className="text-sm mt-1">
                                                            <span className="font-semibold text-slate-700">Объяснение:</span>
                                                            <p className="mt-1 text-slate-600">{span.explanation}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="bg-white rounded-lg shadow-sm p-6 border-2 border-purple-200">
                                        <h2 className="text-lg font-semibold text-slate-800 mb-4">
                                            Ответ модели
                                            {selectedText && (
                                                <span className="ml-2 text-sm text-green-600">
                                                    (выбрано: "{selectedText}")
                                                </span>
                                            )}
                                        </h2>
                                        <div 
                                            ref={responseRef}
                                            className="bg-purple-50 p-4 rounded-lg border border-purple-200 select-text cursor-text"
                                        >
                                            <p className="text-slate-700 text-lg leading-relaxed whitespace-pre-wrap">
                                                {modelResponse}
                                            </p>
                                        </div>
                                        
                                        {!selectedText && (
                                            <p className="mt-4 text-sm text-slate-500 italic text-center">
                                                Выделите мышкой любой текст выше 👆
                                            </p>
                                        )}
                                    </div>
                                </div>
                                
                                <button
                                    onClick={reset}
                                    className="w-full px-6 py-4 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition-all"
                                >
                                    Начать новый анализ
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<PromptAttributionVisualizer />, document.getElementById('root'));
    </script>
</body>
</html>
